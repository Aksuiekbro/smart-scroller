<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SmartScroller</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="pop">
      <header>
        <strong>SmartScroller</strong>
        <label class="switch">
          <input type="checkbox" id="enabled" />
          <span class="slider"></span>
        </label>
      </header>

      <div class="mode" id="mode">Focus mode</div>

      <div class="steer-row">
        <span>Auto-steer · confirm before sending</span>
        <label class="switch">
          <input type="checkbox" id="autoSteer" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="stats">
        <div class="stat"><span class="num" id="blurred">0</span><span class="lbl">blurred today</span></div>
        <div class="stat"><span class="num" id="allowed">0</span><span class="lbl">on-topic</span></div>
        <div class="stat"><span class="num" id="labeled">0</span><span class="lbl">labeled</span></div>
        <div class="stat"><span class="num" id="tuned">0</span><span class="lbl">tuned</span></div>
        <div class="stat"><span class="num" id="avoided">0</span><span class="lbl">avoided</span></div>
      </div>

      <div class="pause">
        <div class="pause-state" id="pauseState">Not paused</div>
        <div class="pause-actions">
          <button data-pause="15">15m</button>
          <button data-pause="60">1h</button>
          <button data-pause="0" class="resume">Resume</button>
        </div>
      </div>

      <div class="training">
        <div class="training-head">
          <strong>Training queue</strong>
          <span id="queueCount">0 saved</span>
        </div>
        <div class="queue-preview" id="queuePreview">No useful videos saved yet.</div>
        <div class="queue-actions">
          <button id="openNext">Open next</button>
          <button id="openSearch">Learning search</button>
          <button id="clearQueue">Clear</button>
        </div>
      </div>

      <section class="analyzer">
        <label for="analyzerText">Analyze a post locally</label>
        <textarea id="analyzerText" rows="4" placeholder="Paste text here for a signal review…"></textarea>
        <button class="analyze" id="analyze">Review text</button>
        <div class="analysis-result" id="analysisResult" aria-live="polite"></div>
      </section>

      <button class="open-options" id="openOptions">Edit feed steering</button>
    </div>
    <script src="../content/classifier.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
